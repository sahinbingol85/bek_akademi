<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}BEK Eğitim Akademi - Bireyselleştirilmiş Eğitim Koçluğu{% endblock %}</title>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                'bek-bg': '#FBF7F0',    
                'bek-dark': '#2D3436',  
                'bek-gold': '#E69530',  
              },
              fontFamily: {
                'sans': ['Inter', 'sans-serif'],
              }
            }
          }
        }
    </script>
</head>
<body class="bg-bek-bg text-bek-dark font-sans antialiased">

    <!-- Header -->
    <header class="bg-white border-b-2 border-bek-gold shadow-sm relative">
        <nav class="container mx-auto px-6 py-3 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <img src="{{ url_for('static', path='/images/logo.png') }}" alt="BEK Logo" class="h-16 w-auto">
                <span class="text-3xl font-bold text-bek-dark tracking-tight">
                    <span class="text-bek-gold">BEK</span> Eğitim Akademi
                </span>
            </a>
            
            <!-- Masaüstü Menü -->
            <div class="hidden md:flex items-center space-x-8 font-medium">
                <a href="/" class="text-bek-dark hover:text-bek-gold transition">Ana Sayfa</a>
                <a href="/hakkimizda" class="text-bek-dark hover:text-bek-gold transition">Felsefemiz</a>
                <a href="/programlar" class="text-bek-dark hover:text-bek-gold transition">Programlarımız</a>
                <a href="/iletisim" class="bg-bek-gold text-white px-6 py-2.5 rounded-full hover:bg-bek-dark transition">İletişim</a>
            </div>
            
            <!-- Mobil Buton -->
            <div class="md:hidden">
                <button id="mobile-menu-btn" class="text-bek-dark focus:outline-none">
                    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </nav>
        
        <!-- Mobil Menü: Absolute ile navbarın altına tam oturur -->
        <div id="mobile-menu" class="hidden md:hidden absolute top-full left-0 w-full bg-white border-b-2 border-bek-gold flex-col items-center py-8 space-y-6 z-50 shadow-xl">
            <a href="/" class="text-bek-dark text-lg hover:text-bek-gold transition">Ana Sayfa</a>
            <a href="/hakkimizda" class="text-bek-dark text-lg hover:text-bek-gold transition">Felsefemiz</a>
            <a href="/programlar" class="text-bek-dark text-lg hover:text-bek-gold transition">Programlarımız</a>
            <a href="/iletisim" class="bg-bek-gold text-white px-8 py-3 rounded-full hover:bg-bek-dark transition">İletişim</a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 md:py-16">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-bek-dark text-gray-200 mt-16 py-12 border-t border-gray-700">
        <div class="container mx-auto px-6 text-center">
            <p class="text-2xl font-bold text-white mb-4"><span class="text-bek-gold">BEK</span> Eğitim Akademi</p>
            <p class="mb-6 max-w-xl mx-auto">Yeni Nesil Eğitim | LGS - YKS VIP Eğitim & Olimpiyat Hazırlıkları</p>
            <p class="text-sm text-gray-500">© 2026 BEK Eğitim Akademi. Tüm Hakları Saklıdır.</p>
        </div>
    </footer>

    <!-- Sosyal Medya -->
    <div class="fixed bottom-8 right-8 flex flex-col gap-4 z-50">
        <a href="https://wa.me/905076005815" target="_blank" class="bg-green-500 text-white p-4 rounded-full shadow-lg hover:scale-110 transition-transform">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.888 4.44-9.89 9.896-.001 2.237.692 4.167 1.944 5.766l-1.104 4.037 4.131-1.082z"/></svg>
        </a>
        <a href="https://www.instagram.com/bekegitimakademi" target="_blank" class="bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 text-white p-4 rounded-full shadow-lg hover:scale-110 transition-transform">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.948-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4s1.791-4 4-4 4 1.79 4 4-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </a>
    </div>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
            menu.classList.toggle('flex');
        });
    </script>
</body>
</html>
